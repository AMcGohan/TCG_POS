<button (click)="clearList()">Clear List</button>

<div class="card-grid">
  @for (card of clientList(); track $index) {
    <!-- Use card.id if 'card' is an object -->
    <img src="https://api.scryfall.com/cards/{{card}}?format=image&version=small"
         alt="card.name" 
         style="width: 100px;">
  }
</div>

<p>Total: ${{ totalPrice().toFixed(2) }}</p>
