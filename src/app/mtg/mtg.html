<!-- ngSubmit handles both the button click and the Enter key -->
<form class="search_mtg" (ngSubmit)="search(filter.value)">
  <input 
    type="text" 
    placeholder="Search MTG cards" 
    #filter />

  <!-- Note: type="submit" is the default, but explicitly setting it is clearer -->
  <button class="primary" type="submit">Search</button>
</form>

<div class="cards">
    @for (card of cards; track $index) {
    <div class="card">
        <img src="{{ card.image_uris?.small }}" alt="{{ card.name }}" />
        <p>{{ card.name }}</p>
        <h3>{{ card.card_set }}, {{ card.card_cn }}</h3> 
        <h4>Price: {{ card.prices? (card.prices | currency) : 'Price not available' }}</h4>
        <h4>Foil: {{ card.prices_foil ? (card.prices_foil | currency) : 'Price not available' }}</h4>
    </div>
    }
</div>
