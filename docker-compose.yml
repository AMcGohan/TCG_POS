services:
  tcg_frontend:
    # build the same image we tested earlier
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4200:4200"
    # mount project into container for live development
    volumes:
      - .:/usr/src/app:delegated
      # ensure host node_modules is ignored inside container
      - /usr/src/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true   # necessary on some Docker setups for file watching
    command: ["npx", "ng", "serve", "--host", "0.0.0.0", "--poll=2000"]
  tcg_db:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: tcg_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/tcg_data
  db_admin:
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@epic.com
      PGADMIN_DEFAULT_PASSWORD: adminpass
    ports:
      - "5050:80"
    depends_on:
      - tcg_db

volumes:
  postgres_data:

